// ═══ Chat Room ═══
function ChatRoom(){const{chats,chatId,setPg,sendMsg}=useApp();
const chat=chats.find(c=>c.id===chatId);const[txt,setTxt]=useState('');
const ref=React.useRef(null);
useEffect(()=>{if(ref.current)ref.current.scrollTop=ref.current.scrollHeight},[chat?.msgs?.length]);
if(!chat)return null;
const send=()=>{if(!txt.trim())return;sendMsg(chatId,txt.trim());setTxt('')};
return(<div style={{paddingTop:8,display:'flex',flexDirection:'column',height:'calc(100vh - 130px)'}}>
<div style={{display:'flex',alignItems:'center',gap:12,paddingBottom:12,borderBottom:'1px solid var(--bg3)',marginBottom:8}}>
<button className="btn btn-g btn-sm" onClick={()=>setPg('chat')} style={{padding:4,fontSize:16}}>←</button>
<div style={{width:36,height:36,borderRadius:18,background:'var(--amber-l)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>{chat.av}</div>
<div><div style={{fontWeight:700,fontSize:14}}>{chat.name}</div><div style={{fontSize:11,color:'var(--text2)'}}>{chat.co}</div></div>
</div>
<div ref={ref} style={{flex:1,overflowY:'auto',padding:'8px 0',display:'flex',flexDirection:'column',gap:8}}>
{chat.msgs.map(m=>(
<div key={m.id} style={{display:'flex',flexDirection:'column',alignItems:m.from==='me'?'flex-end':'flex-start'}}>
<div style={{maxWidth:'75%',padding:'10px 14px',borderRadius:14,fontSize:14,lineHeight:1.5,wordBreak:'break-word',background:m.from==='me'?'var(--amber)':'var(--bg2)',color:m.from==='me'?'#fff':'var(--text)',borderBottomRightRadius:m.from==='me'?4:14,borderBottomLeftRadius:m.from==='me'?14:4}}>{m.text}</div>
<span style={{fontSize:10,color:'var(--text3)',marginTop:2,padding:'0 4px'}}>{m.at}</span>
</div>))}
</div>
<div style={{display:'flex',gap:8,paddingTop:12,borderTop:'1px solid var(--bg3)'}}>
<input className="inp" value={txt} onChange={e=>setTxt(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} placeholder="메시지를 입력하세요" style={{flex:1}}/>
<button className="btn btn-a btn-sm" onClick={send} disabled={!txt.trim()} style={{flexShrink:0}}>전송</button>
</div>
</div>);
}

<div><div style={{fontSize:13,fontWeight:500}}>{x.l}</div><div style={{fontSize:11,color:'var(--text3)'}}>{x.d}</div></div>
<T on={st2[x.k]} fn={()=>tg(x.k)} label={x.l}/></div>))}
</div>
<div className="card"><div style={{padding:'12px 18px',borderBottom:'1px solid var(--bg2)'}}><h3 style={{fontSize:13,fontWeight:700}}>🔔 알림</h3></div>
{[{k:'noti',l:'푸시 알림'},{k:'weekly',l:'주간 매칭 리포트'}].map(x=>(
<div key={x.k} style={{padding:'10px 18px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
<span style={{fontSize:13}}>{x.l}</span><T on={st2[x.k]} fn={()=>tg(x.k)} label={x.l}/></div>))}
</div></div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
